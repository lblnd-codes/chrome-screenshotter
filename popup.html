<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      width: 220px;
      background: #1a1a1a;
      color: #f0f0f0;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    button {
      width: 100%;
      padding: 10px;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-screenshot { background: #2563eb; margin-bottom: 8px; }
    #btn-screenshot:hover { background: #1d4ed8; }
    #btn-screenshot:active { background: #1e40af; }

    #btn-record { background: #16a34a; }
    #btn-record:hover { background: #15803d; }
    #btn-record:active { background: #166534; }
    #btn-record.recording { background: #dc2626; }
    #btn-record.recording:hover { background: #b91c1c; }

    button:disabled { background: #374151 !important; color: #6b7280; cursor: default; }

    .record-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
      flex-shrink: 0;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    hr {
      border: none;
      border-top: 1px solid #2d2d2d;
      margin: 10px 0;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
      min-height: 16px;
      word-break: break-all;
    }
    #status.success { color: #34d399; }
    #status.error   { color: #f87171; }
  </style>
</head>
<body>
  <h3>Screenshot & Recorder</h3>
  <button id="btn-screenshot">Take Screenshot</button>
  <hr>
  <button id="btn-record">
    <span class="record-label"><span id="record-text">Start Recording</span></span>
  </button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
